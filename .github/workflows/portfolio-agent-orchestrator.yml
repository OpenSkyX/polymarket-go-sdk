name: Portfolio Agent Orchestrator

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode (blank=auto by schedule)"
        required: false
        default: ""
        type: choice
        options:
          - ""
          - plan
          - execute
      qa_full_test:
        description: "Run full QA tests on execute"
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "0 1 * * 1"
    - cron: "0 2 * * 2-6"

permissions:
  contents: read

jobs:
  dispatch:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - repo: GoPolymarket/go-builder-relayer-client
            company: platform-core
          - repo: GoPolymarket/polymarket-go-sdk
            company: platform-core
          - repo: GoPolymarket/polygate
            company: company-b
          - repo: GoPolymarket/polymarket-trader
            company: company-a

    steps:
      - name: Resolve mode
        id: mode
        shell: bash
        run: |
          MODE="${{ github.event.inputs.mode }}"
          if [ -z "$MODE" ]; then
            if [ "${{ github.event.schedule }}" = "0 1 * * 1" ]; then
              MODE="plan"
            else
              MODE="execute"
            fi
          fi
          echo "mode=$MODE" >> "$GITHUB_OUTPUT"

      - name: Resolve QA full test
        id: qa
        shell: bash
        run: |
          QA_FULL_TEST="${{ github.event.inputs.qa_full_test }}"
          if [ -z "$QA_FULL_TEST" ]; then QA_FULL_TEST="false"; fi
          echo "qa_full_test=$QA_FULL_TEST" >> "$GITHUB_OUTPUT"

      - name: Dispatch target workflow
        env:
          GH_TOKEN: ${{ secrets.PORTFOLIO_BOT_TOKEN }}
        shell: bash
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "PORTFOLIO_BOT_TOKEN is not set" >&2
            exit 1
          fi

          gh workflow run agent-team-delivery.yml \
            --repo "${{ matrix.repo }}" \
            -f mode="${{ steps.mode.outputs.mode }}" \
            -f company="${{ matrix.company }}" \
            -f qa_full_test="${{ steps.qa.outputs.qa_full_test }}"

      - name: Append summary
        shell: bash
        run: |
          {
            echo "### Dispatch"
            echo "- target_repo: \\`${{ matrix.repo }}\\`"
            echo "- company: \\`${{ matrix.company }}\\`"
            echo "- mode: \\`${{ steps.mode.outputs.mode }}\\`"
            echo "- qa_full_test: \\`${{ steps.qa.outputs.qa_full_test }}\\`"
          } >> "$GITHUB_STEP_SUMMARY"
